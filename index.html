<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Maker - Sistema de Agendamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="src/senai.png" alt="SENAI" class="logo-icon">
            <p class="login-subtitle">Sistema de Agendamentos</p>
        </div>
        <div class="login-tabs">
            <button class="tab-btn active" data-tab="admin">👑 Administrador</button>
            <button class="tab-btn" data-tab="solicitante">👤 Solicitante</button>
        </div>
        <div id="adminPanel" class="login-panel active">
            <div class="form-group">
                <label>📧 E-mail</label>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            </div>
            <div class="form-group">
                <label>🔒 Senha</label>
                <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password">
            </div>
            <button id="btnLogin" class="btn-login">Entrar como Admin</button>
            <a href="#" id="esqueciSenha" class="forgot-link">Esqueceu a senha?</a>
        </div>
        <div id="solicitantePanel" class="login-panel">
            <div class="info-box">
                <p>🔓 Acesso como solicitante permite:</p>
                <ul>
                    <li>✓ Visualizar datas disponíveis</li>
                    <li>✓ Fazer solicitações de agendamento</li>
                    <li>✓ Acompanhar status dos pedidos</li>
                </ul>
            </div>
            <button onclick="entrarSolicitante()" class="btn-solicitante">Entrar como Solicitante</button>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>
<button class="theme-toggle" id="themeToggle" title="Alternar tema">🌙</button>
<script src="script.js"></script>
</body>
</html>
